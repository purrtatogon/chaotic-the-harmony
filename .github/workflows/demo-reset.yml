name: "Demo Self-Heal: 20-Minute Reset"

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  reset-and-reseed:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2 # Updated to v2 for Node 24 support
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Open Firewall for GitHub Runner
        run: |
          # Dynamically allow the GitHub Runner IP
          az postgres flexible-server firewall-rule create \
            --resource-group chaotic-the-harmony-rg \
            --name chaotic-the-harmony-db-server \
            --rule-name AllowGitHub \
            --start-ip-address 0.0.0.0 \
            --end-ip-address 255.255.255.255
          # Note: Using 0.0.0.0-255.255.255.255 is the simplest for demos
          # but you can use "az postgres flexible-server firewall-rule create --public-access 0.0.0.0"

      - name: Wipe Database Schema
        run: |
          az postgres flexible-server execute \
            --name chaotic-the-harmony-db-server \
            --resource-group chaotic-the-harmony-rg \
            --admin-user ${{ secrets.AZURE_DB_ADMIN_USER }} \
            --admin-password "${{ secrets.AZURE_DB_ADMIN_PASSWORD }}" \
            --database-name chaotic_the_harmony_prod \
            --querytext "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

      - name: Restart API to Trigger Seeder
        run: |
          az webapp restart --name chaotic-the-harmony-api --resource-group chaotic-the-harmony-rg