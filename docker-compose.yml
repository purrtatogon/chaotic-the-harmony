services:

# --------------------
# PostgreSQL Database
# --------------------
  db:
    image: postgres:16-alpine
    container_name: cth_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-bandstoredb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# --------------------
# Spring Boot Backend
# --------------------
  backend:
    build:
      # My source code is inside the 'backend' project (name) folder.
      context: ./backend
      dockerfile: Dockerfile
    container_name: spring_backend
    restart: on-failure
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # For activating the 'docker' profile to load application-docker.properties
      SPRING_PROFILES_ACTIVE: docker
      # Database (must match db service)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bandstoredb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}

# --------------------
# React Frontend
# --------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_URL is baked into the static bundle at build time (not a runtime var).
        # The browser runs on the HOST machine, so localhost:8080 correctly reaches the
        # backend container whose port 8080 is mapped to the host below.
        - VITE_API_URL=http://localhost:8080/api/v1
    container_name: react_frontend
    restart: always
    depends_on:
      - backend
    ports:
      # Nginx inside the container listens on port 80.
      # We expose it on host port 5173 so the browser origin matches the CORS allow-list
      # in SecurityConfig (which permits http://localhost:5173).
      - "5173:80"

volumes:
  postgres_data:
