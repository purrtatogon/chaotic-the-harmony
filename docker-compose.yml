services:

# --------------------
# PostgreSQL Database
# --------------------
  db:
    image: postgres:16-alpine
    container_name: cth_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bandstoredb123postgres
      POSTGRES_DB: bandstoredb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# --------------------
# Spring Boot Backend
# --------------------
  backend:
    build:
      # My source code is inside the 'backend' project (name) folder.
      context: ./backend 
      dockerfile: Dockerfile
    container_name: spring_backend
    restart: on-failure
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bandstoredb
      SPRING_DATASOURCE_USERNAME: postgres 
      SPRING_DATASOURCE_PASSWORD: bandstoredb123postgres 

# --------------------
# React Frontend
# --------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:5173"
    environment:
      # The browser (running on my host) needs to hit localhost, not the docker internal name!
      REACT_APP_API_URL: http://localhost:5173

volumes:
  postgres_data:
